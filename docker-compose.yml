services:
  db:
    image: postgres:16-alpine
    shm_size: '256mb' # Increase from default 64mb
    environment:
      POSTGRES_DB: cleandrop
      POSTGRES_USER: cleandrop
      POSTGRES_PASSWORD: cleandrop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleandrop"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cleandrop:cleandrop@db:5432/cleandrop
      JWT_SECRET: changeme-in-production
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  pgdata:
